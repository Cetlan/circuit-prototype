<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 80" width="90" height="80">
  <!-- Pin 1: Base Lead & Bar -->
  <line x1="0" y1="30" x2="30" y2="30" stroke="#000000" stroke-width="2" />
  <line x1="30" y1="15" x2="30" y2="45" stroke="#000000" stroke-width="3" stroke-linecap="round" />
  
  <!-- Pin 2: Collector (Top) -->
  <path d="M 60,0 L 60,10 L 32,24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Pin 3: Emitter with Arrow (Bottom) -->
  <path d="M 60,60 L 60,50 L 32,36" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Standard Emitter Arrow (Angled cleanly along the 45° path) -->
  <polygon points="42,41 49,45 45,37" fill="#000000" />
  
  <!-- Transistor Outer Circle Envelope -->
  <circle cx="45" cy="30" r="22" fill="none" stroke="#000000" stroke-width="2" />

  <!-- Invisible Pins (Perfectly Grid-Aligned) -->
  <!-- Pin 1: Base -->
  <circle cx="0" cy="30" r="5" fill="none" stroke="none" opacity="0" data-pin-number="1" />
  <!-- Pin 2: Collector -->
  <circle cx="60" cy="0" r="5" fill="none" stroke="none" opacity="0" data-pin-number="2" />
  <!-- Pin 3: Emitter -->
  <circle cx="60" cy="60" r="5" fill="none" stroke="none" opacity="0" data-pin-number="3" />
</svg>
