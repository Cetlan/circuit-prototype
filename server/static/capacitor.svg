<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100" height="60">
  <!-- Leads -->
  <line x1="0" y1="30" x2="35" y2="30" stroke="#000000" stroke-width="2" />
  <line x1="45" y1="30" x2="80" y2="30" stroke="#000000" stroke-width="2" />
  <!-- Plates -->
  <line x1="35" y1="10" x2="35" y2="50" stroke="#000000" stroke-width="2" stroke-linecap="round" />
  <line x1="45" y1="10" x2="45" y2="50" stroke="#000000" stroke-width="2" stroke-linecap="round" />
  <!-- Invisible Pins -->
  <circle cx="0" cy="30" r="5" fill="none" stroke="none" opacity="0" data-pin-number="1" />
  <circle cx="80" cy="30" r="5" fill="none" stroke="none" opacity="0" data-pin-number="2" />
</svg>
